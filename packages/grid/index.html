<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Webpack App</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                border: 0;
            }

            html, body {overflow:hidden; }

            .root {
                position: relative;
                height: calc(100vh - 50px);
                width: calc(100vw - 50px);
                margin: 25px;
                overflow: scroll;
            }

            .wrapper {

            }

            .row {
                display: block;
                position: absolute;
                opacity: 0.8;
                width: calc(100% - 2px);
                height: 22px;
                border: 1px solid rgba(0,0,0,0.1);
                border-top: none;
                background: rgba(0, 255, 255, 0.2)
            }
        </style>
    </head>
    <body>
        <div class="root">

        </div>
    </body>
    
</html>
